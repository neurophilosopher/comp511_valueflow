# Main Experiment Configuration
# This is the root config file that composes all other configs

defaults:
  - simulation: sequential
  - model: gpt4
  - environment: generic_world
  - scenario: marketplace
  - evaluation: basic_metrics
  - _self_

# Experiment metadata
experiment:
  name: ${scenario.name}_experiment
  description: "Multi-agent simulation experiment"
  seed: 42
  output_dir: outputs/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}

# Hydra configuration
hydra:
  run:
    dir: ${experiment.output_dir}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
  output_subdir: .hydra
