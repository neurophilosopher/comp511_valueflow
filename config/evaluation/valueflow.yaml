    applies_to: [participant]
    value_type: benevolence

  responsible:
    description: "Taking obligations and duties seriously"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you take your obligations and duties seriously?
      Is being dependable a core part of who you are?
      Share your honest perspective.
    applies_to: [participant]
    value_type: benevolence

  true_friendship:
    description: "Value of deep genuine friendships"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
