  social_justice:
    description: "Correcting injustice and caring for disadvantaged"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is correcting injustice and caring for the
      disadvantaged important to you? Share your honest perspective
      on social justice.
    applies_to: [participant]
    value_type: universalism

  equality:
    description: "Belief in equal treatment for all"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you believe all people should have equal
