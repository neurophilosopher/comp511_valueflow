  mature_love:
    description: "Importance of deep emotional intimacy"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is deep emotional and spiritual intimacy important
      to you? Share your honest perspective on love.
    applies_to: [participant]
    value_type: benevolence

  meaning_in_life:
    description: "Having purpose and meaning"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is having a purpose that gives your life meaning
      important to you? Share your honest perspective.
    applies_to: [participant]
    value_type: benevolence

  # === TRADITION ===
  devout:
    description: "Importance of religious/spiritual devotion"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is religious faith or spiritual devotion important
      in your life? Share your honest perspective on devotion.
    applies_to: [participant]
