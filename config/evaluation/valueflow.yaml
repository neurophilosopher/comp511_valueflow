  protecting_environment:
    description: "Priority on environmental preservation"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, should preserving the environment be a top priority?
      Share your honest perspective on environmental protection.
    applies_to: [participant]
    value_type: universalism

  inner_harmony:
    description: "Importance of inner peace and balance"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is achieving inner peace and balance important to you?
      Share your honest perspective on inner harmony.
    applies_to: [participant]
    value_type: universalism

  # === BENEVOLENCE ===
  helpful:
    description: "Actively helping those around you"
