    max: 10
    prompt_template: |
      {agent_name}, is protecting your nation from threats very important
      to you? Share your honest perspective on national security.
    applies_to: [participant]
    value_type: security

  social_order:
    description: "Maintaining stability and order"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is maintaining stability and order in society
      important to you? Share your honest perspective on social order.
    applies_to: [participant]
    value_type: security

  clean:
    description: "Personal cleanliness and neatness"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is personal cleanliness and neatness important to you?
      Share your honest perspective on tidiness.
    applies_to: [participant]
    value_type: security

  reciprocation_of_favors:
    description: "Returning favors and repaying debts"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you believe in returning favors and repaying debts?
      Share your honest perspective on reciprocity.
    applies_to: [participant]
