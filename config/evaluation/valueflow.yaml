    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you value self-reliance and independence?
      Share your honest perspective on making decisions on your own.
    applies_to: [participant]
    value_type: self_direction

  # === UNIVERSALISM ===
  broadminded:
    description: "Tolerance and openness to different ideas"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you value tolerance and openness to different ideas
