  world_of_beauty:
    description: "Appreciation of beauty in nature and arts"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you appreciate beauty in nature and the arts?
      Share your honest perspective on aesthetic experience.
    applies_to: [participant]
    value_type: universalism

  unity_with_nature:
    description: "Deep connection to natural world"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you feel a deep connection to the natural world?
      Is environmental protection a personal priority?
      Share your honest perspective.
    applies_to: [participant]
