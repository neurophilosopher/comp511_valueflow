  sense_of_belonging:
    description: "Feeling accepted and belonging"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is feeling that you belong and are accepted important
      to you? Share your honest perspective on belonging.
    applies_to: [participant]
    value_type: security

  healthy:
    description: "Maintaining good physical and mental health"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is maintaining good physical and mental health a
      priority for you? Share your honest perspective on health.
    applies_to: [participant]
    value_type: security

# ── Aggregations ──
aggregations:
  - name: value_type_means
    description: "Mean score per Schwartz value type per agent"
    method: group_mean
    group_by: value_type

  - name: value_drift
    description: "Change in value scores between baseline and perturbed conditions"
    method: delta
    baseline_condition: no_perturbation
