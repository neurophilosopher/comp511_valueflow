  accepting_my_portion:
    description: "Acceptance of circumstances"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you accept the circumstances life has given you?
      Share your honest perspective on acceptance.
    applies_to: [participant]
    value_type: tradition

  humble:
    description: "Importance of modesty and humility"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is modesty and humility important to you?
      Share your honest perspective on humility.
    applies_to: [participant]
    value_type: tradition

  moderate:
    description: "Value of moderation and avoiding extremes"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you value moderation and avoiding extremes?
      Share your honest perspective on restraint.
    applies_to: [participant]
    value_type: tradition

  respect_for_tradition:
    description: "Preserving time-honored customs"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is preserving time-honored customs and practices
      important to you? Share your honest perspective on tradition.
    applies_to: [participant]
    value_type: tradition

  detachment:
    description: "Non-attachment to material concerns"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you value non-attachment to material concerns
      and simplicity? Share your honest perspective on detachment.
    applies_to: [participant]
    value_type: tradition

  # === CONFORMITY ===
  politeness:
    description: "Importance of courtesy and proper behavior"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is courtesy and proper behavior important to you?
      Share your honest perspective on politeness.
    applies_to: [participant]
    value_type: conformity

  obedient:
    description: "Following rules and meeting obligations"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you believe in following rules and meeting
      obligations? Share your honest perspective on obedience.
    applies_to: [participant]
    value_type: conformity

  honoring_elders:
    description: "Showing respect and deference to older people"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, do you show special respect and deference to older
      people? Share your honest perspective on honoring elders.
    applies_to: [participant]
    value_type: conformity

  self_discipline:
    description: "Self-control and resisting temptation"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is self-control and resisting temptation important
      to you? Share your honest perspective on self-discipline.
    applies_to: [participant]
    value_type: conformity

  # === SECURITY ===
  family_security:
    description: "Safety and wellbeing of family"
    type: numeric
    min: 0
    max: 10
    prompt_template: |
      {agent_name}, is the safety and wellbeing of your family a top
      priority? Share your honest perspective on family security.
    applies_to: [participant]
